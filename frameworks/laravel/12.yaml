name: laravel
version: "12"
label: Laravel
public_dir: public
create: composer create-project --no-install --no-plugins --no-scripts laravel/laravel

php:
  min: "8.2"
  max: "8.5"

detect:
  - file: artisan
  - composer: laravel/framework

env:
  file: .env
  example_file: .env.example
  format: dotenv
  key_generation:
    env_key: APP_KEY
    command: key:generate
    fallback_prefix: "base64:"
  services:
    mysql:
      detect:
        - key: DB_CONNECTION
          value_prefix: mysql
        - key: DB_CONNECTION
          value_prefix: mariadb
      vars:
        - DB_CONNECTION=mysql
        - DB_HOST=lerd-mysql
        - DB_PORT=3306
        - DB_DATABASE={{site}}
        - DB_USERNAME=root
        - DB_PASSWORD=lerd
    postgres:
      detect:
        - key: DB_CONNECTION
          value_prefix: pgsql
      vars:
        - DB_CONNECTION=pgsql
        - DB_HOST=lerd-postgres
        - DB_PORT=5432
        - DB_DATABASE={{site}}
        - DB_USERNAME=postgres
        - DB_PASSWORD=lerd
    redis:
      detect:
        - key: REDIS_HOST
        - key: CACHE_STORE
          value_prefix: redis
        - key: SESSION_DRIVER
          value_prefix: redis
        - key: QUEUE_CONNECTION
          value_prefix: redis
      vars:
        - REDIS_HOST=lerd-redis
        - REDIS_PORT=6379
        - REDIS_PASSWORD=
    meilisearch:
      detect:
        - key: SCOUT_DRIVER
          value_prefix: meilisearch
      vars:
        - MEILISEARCH_HOST=http://lerd-meilisearch:7700
        - MEILISEARCH_NO_ANALYTICS=true
    rustfs:
      detect:
        - key: FILESYSTEM_DISK
          value_prefix: s3
        - key: AWS_ENDPOINT
      vars:
        - AWS_ACCESS_KEY_ID=lerd
        - AWS_SECRET_ACCESS_KEY=lerdpassword
        - AWS_BUCKET={{site}}
        - AWS_ENDPOINT=http://lerd-rustfs:9000
        - AWS_URL=http://localhost:9000/{{site}}
        - AWS_USE_PATH_STYLE_ENDPOINT=true
    mailpit:
      detect:
        - key: MAIL_HOST
      vars:
        - MAIL_MAILER=smtp
        - MAIL_HOST=lerd-mailpit
        - MAIL_PORT=1025
        - MAIL_USERNAME=null
        - MAIL_PASSWORD=null
        - MAIL_ENCRYPTION=null

composer: auto
npm: auto
console: artisan

workers:
  queue:
    label: Queue Worker
    command: php artisan queue:work --queue=default --tries=3 --timeout=60
    restart: always
  schedule:
    label: Task Scheduler
    command: php artisan schedule:work
    restart: always
  reverb:
    label: Reverb WebSocket
    command: php artisan reverb:start
    restart: on-failure
    check:
      composer: laravel/reverb
    proxy:
      path: /app
      port_env_key: REVERB_SERVER_PORT
      default_port: 8080
  horizon:
    label: Horizon
    command: php artisan horizon
    restart: always
    check:
      composer: laravel/horizon
    conflicts_with:
      - queue

logs:
  - path: storage/logs/*.log
    format: monolog

setup:
  - label: php artisan storage:link
    command: php artisan storage:link
    default: true
  - label: php artisan migrate
    command: php artisan migrate
    default: true
  - label: php artisan db:seed
    command: php artisan db:seed
    default: false
tinker:
  command: ["artisan", "tinker"]
  execute_flag: "--execute"
  requires_package: laravel/tinker
  requires_file: artisan
