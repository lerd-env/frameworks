name: drupal
version: "10"
label: Drupal
public_dir: web
favicon: core/misc/favicon.ico
create: composer create-project drupal/recommended-project
php:
  min: "8.1"
  max: "8.4"

detect:
  - composer: drupal/core-recommended
  - composer: drupal/core

env:
  file: .env
  format: dotenv
  fallback_file: web/sites/default/settings.php
  fallback_format: php-const
  services:
    mysql:
      detect:
        - key: DB_DRIVER
          value_prefix: mysql
        - key: database
          value_prefix: mysql
      vars:
        - DB_DRIVER=mysql
        - DB_HOST=lerd-mysql
        - DB_PORT=3306
        - DB_NAME={{site}}
        - DB_USER=root
        - DB_PASSWORD=lerd
    postgres:
      detect:
        - key: DB_DRIVER
          value_prefix: pgsql
        - key: database
          value_prefix: pgsql
      vars:
        - DB_DRIVER=pgsql
        - DB_HOST=lerd-postgres
        - DB_PORT=5432
        - DB_NAME={{site}}
        - DB_USER=postgres
        - DB_PASSWORD=lerd
    redis:
      detect:
        - key: REDIS_HOST
      vars:
        - REDIS_HOST=lerd-redis
        - REDIS_PORT=6379
    mailpit:
      detect:
        - key: SMTP_HOST
      vars:
        - SMTP_HOST=lerd-mailpit
        - SMTP_PORT=1025

composer: auto
npm: false

workers:
  cron:
    label: Cron
    command: php vendor/drush/drush/drush.php cron
    restart: always
    check:
      composer: drush/drush

setup:
  - label: Install site
    command: php vendor/drush/drush/drush.php site:install --yes
    check:
      composer: drush/drush
  - label: Run database updates
    command: php vendor/drush/drush/drush.php updatedb --yes
    default: true
    check:
      composer: drush/drush
  - label: Rebuild cache
    command: php vendor/drush/drush/drush.php cache:rebuild
    default: true
    check:
      composer: drush/drush
  - label: Import config
    command: php vendor/drush/drush/drush.php config:import --yes
    check:
      composer: drush/drush

tinker:
  command: ["vendor/drush/drush/drush.php", "php:eval"]
  execute_positional: true
  requires_package: drush/drush
  requires_file: vendor/drush/drush/drush.php

commands:
  - name: cr
    label: Rebuild cache
    command: drush cr
    description: Rebuild all Drupal caches
    output: silent
    icon: broom
  - name: uli
    label: Login as admin
    command: drush uli
    description: Generate a one-time admin login URL
    output: url
    icon: key
  - name: updb
    label: Run database updates
    command: drush updb -y
    description: Apply pending hook_update_N updates
    output: silent
    icon: database
  - name: cex
    label: Export config
    command: drush cex -y
    description: Export configuration to the sync directory
    output: text
    icon: arrow-up
  - name: cim
    label: Import config
    command: drush cim -y
    description: Import configuration from the sync directory
    output: text
    confirm: true
    icon: arrow-down
