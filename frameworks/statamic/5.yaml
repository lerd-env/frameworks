name: statamic
version: "5"
label: Statamic
public_dir: public
create: composer create-project statamic/statamic
php:
  min: "8.2"
  max: "8.4"

detect:
  - composer: statamic/cms

env:
  file: .env
  example_file: .env.example
  format: dotenv
  key_generation:
    env_key: APP_KEY
    command: key:generate
    fallback_prefix: "base64:"
  services:
    mysql:
      detect:
        - key: DB_CONNECTION
          value_prefix: mysql
      vars:
        - DB_CONNECTION=mysql
        - DB_HOST=lerd-mysql
        - DB_PORT=3306
        - DB_DATABASE={{site}}
        - DB_USERNAME=root
        - DB_PASSWORD=lerd
    postgres:
      detect:
        - key: DB_CONNECTION
          value_prefix: pgsql
      vars:
        - DB_CONNECTION=pgsql
        - DB_HOST=lerd-postgres
        - DB_PORT=5432
        - DB_DATABASE={{site}}
        - DB_USERNAME=postgres
        - DB_PASSWORD=lerd
    redis:
      detect:
        - key: REDIS_HOST
      vars:
        - REDIS_HOST=lerd-redis
        - REDIS_PORT=6379
        - REDIS_PASSWORD=
    mailpit:
      detect:
        - key: MAIL_HOST
      vars:
        - MAIL_MAILER=smtp
        - MAIL_HOST=lerd-mailpit
        - MAIL_PORT=1025
        - MAIL_USERNAME=null
        - MAIL_PASSWORD=null
        - MAIL_ENCRYPTION=null

composer: auto
npm: auto
console: artisan

workers:
  queue:
    label: Queue Worker
    command: php artisan queue:work --queue=default --tries=3 --timeout=60
    restart: always
  schedule:
    label: Task Scheduler
    command: php artisan schedule:work
    restart: always

logs:
  - path: storage/logs/*.log
    format: monolog

setup:
  - label: php artisan storage:link
    command: php artisan storage:link
    default: true
  - label: php please install
    command: php please install
    default: true
  - label: Refresh stache
    command: php please stache:refresh
    default: true
tinker:
  command: ["artisan", "tinker"]
  execute_flag: "--execute"
  requires_package: laravel/tinker
  requires_file: artisan
